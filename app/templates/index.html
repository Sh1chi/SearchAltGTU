{% extends "base.html" %}
{% block content %}
  <h1>Поиск упоминаний ФИО в новостях АлтГТУ</h1>
  <p class="muted">Поддерживает падежи и варианты написания (NER).</p>

  <form class="form" action="/search" method="get">
    <input name="q" class="input" placeholder="Например: Иванов Иван Иванович или Иванов И.И." autofocus />
    <button class="btn" type="submit">Искать</button>
  </form>

  <div class="hint">
    <div>Примеры:</div>
    <ul>
      <li>Иванов Иван Иванович</li>
      <li>Иванов И. И.</li>
      <li>Иванов Иван</li>
      <li>Иванов</li>
    </ul>
  </div>
{% endblock %}
